async function supaGet(id){
  try{
    var r=await fetch(SUPA_URL+'/rest/v1/dbshift_data?id=eq.'+id+'&select=data',{
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
    });
    var d=await r.json();
    return d.length?d[0].data:null;
  }catch(e){return null;}
}
async function supaSet(id,data){
  try{
    await fetch(SUPA_URL+'/rest/v1/dbshift_data',{
      method:'POST',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({id:id,data:data,updated_at:new Date().toISOString()})
    });
    setSyncDot('ok');
  }catch(e){setSyncDot('err');}
}
function setSyncDot(s){
  var d=document.getElementById('syncDot');

async function loadFromSupabase(){
  try{
    var emp=await supaGet('employees');
    if(emp&&emp.emp)S.emp=emp.emp;
    var plan=await supaGet('plan');
    if(plan&&plan.plan)S.plan=plan.plan;
    var ptg=await supaGet('ptg');
    if(ptg&&ptg.ptg)S.ptg=ptg.ptg;
    var cfg=await supaGet('config');
    if(cfg){
      if(cfg.cfg)S.cfg=cfg.cfg;
      if(cfg.extra)S.extra=cfg.extra;
      if(cfg.interim)S.interim=cfg.interim;
    }
    var arch=await supaGet('archives');
    if(arch&&arch.archives)S.archives=arch.archives;
    try{
      localStorage.setItem('dbs-e',JSON.stringify(S.emp));
      localStorage.setItem('dbs-p',JSON.stringify(S.plan));
      localStorage.setItem('dbs-t',JSON.stringify(S.ptg));
      localStorage.setItem('dbs-x',JSON.stringify(S.extra));
      localStorage.setItem('dbs-c',JSON.stringify(S.cfg));
      localStorage.setItem('dbs-i',JSON.stringify(S.interim));
      localStorage.setItem('dbs-ar',JSON.stringify(S.archives));
    }catch(e){}
    setSyncDot('ok');
    render();
  }catch(e){setSyncDot('err');}
}

function now0(){var d=new Date();d.setHours(0,0,0,0);return d;}
function isActive(e){if(!e.fin||FIN_T.indexOf(e.t)<0)return true;return new Date(e.fin)>=now0();}
function mon(o){var d=new Date(),w=d.getDay()||7;d.setDate(d.getDate()-w+1+o*7);d.setHours(0,0,0,0);return d;}
function fd(d){return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});}
function wkey(o){var m=mon(o);return m.getFullYear()+'-'+(m.getMonth()<9?'0':'')+(m.getMonth()+1)+'-'+(m.getDate()<10?'0':'')+m.getDate();}
function wlbl(o){var m=mon(o),s=new Date(m);s.setDate(s.getDate()+6);return'Semaine du '+fd(m)+' au '+fd(s);}
function allSlots(){return SLOTS.concat(S.extra);}
function slotOf(id){var all=allSlots();for(var i=0;i<all.length;i++){if(all[i].id===id)return all[i];}return SLOTS[0];}
function isLabo(id){return LABO_IDS.indexOf(id)>=0||(id&&id.indexOf('C-')===0);}
function isOffId(id){return OFF_IDS.indexOf(id)>=0;}
function slotCls(id){if(isLabo(id))return'sl';if(id==='CP')return'sc';if(id==='AM')return'sa';if(id==='ECOLE')return'se';if(id==='RECUP')return'sr';if(id==='OFF')return'so';return'';}
function plines(day){
  var labo=(day&&day.labo)||'',pd=(day&&day.pd)||'',pf=(day&&day.pf)||'',r=[];
  if(labo){var s=slotOf(labo);if(s.d){r.push(s.d+' &#x2192; '+s.f);if(s.midi)r.push('pause repas midi');if(s.soir)r.push('pause repas soir');}else r.push(s.lb);}
  if(pd)r.push(pf?'Presta : '+pd+' &#x2192; '+pf:'Presta d\u00e8s '+pd);
  return r.length?r:['Repos'];
}
function nowt(){var n=new Date();return(n.getHours()<10?'0':'')+n.getHours()+':'+(n.getMinutes()<10?'0':'')+n.getMinutes();}
function todayDi(){var d=new Date().getDay();return d===0?6:d-1;}
function W(){return wkey(S.wo);}
function getDay(eid,di){return(S.plan[W()]&&S.plan[W()][eid]&&S.plan[W()][eid][di])||{};}
function getDayW(wk,eid,di){return(S.plan[wk]&&S.plan[wk][eid]&&S.plan[wk][eid][di])||{};}
function getPtg(eid,di){return(S.ptg[W()]&&S.ptg[W()][eid]&&S.ptg[W()][eid][di])||{};}
function actEmp(){return S.emp.filter(isActive);}
function DD(){var m=mon(S.wo),r=[];for(var i=0;i<7;i++){var d=new Date(m);d.setDate(d.getDate()+i);r.push(d);}return r;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hstr(h){if(!h)return'\u2014';return Math.floor(h)+'h'+(Math.round((h%1)*60)?String(Math.round((h%1)*60)).padStart(2,'0'):'');}
function toMin(t){if(!t)return 0;var s=t.replace('h',':');var p=s.split(':');return parseInt(p[0])*60+(parseInt(p[1])||0);}

function slotH(id){
  if(SLOT_H[id])return SLOT_H[id];
  var s=slotOf(id);
  if(s&&s.d&&s.f){var dH=parseInt(s.d),fH=parseInt(s.f),h=fH-dH;if(s.midi)h-=1;if(s.soir)h-=1;return Math.max(0,h);}
  return 0;
}
function prestaH(pd,pf){
  if(!pd||!pf)return 0;
  function toH(t){return parseInt(t)+(t.indexOf('h30')>=0?0.5:0);}
  return Math.max(0,toH(pf)-toH(pd));
}
function weekStatsW(wk,eid){
  var totalH=0,repas=0,cp=0,am=0,ecole=0,recup=0;
  for(var di=0;di<7;di++){
    var day=getDayW(wk,eid,di),labo=day.labo||'';
    if(labo==='CP')cp++;
    else if(labo==='AM')am++;
    else if(labo==='ECOLE')ecole++;
    else if(labo==='RECUP')recup++;
    else{totalH+=slotH(labo);var s=slotOf(labo);if(s&&(s.midi||s.soir))repas+=(s.midi?1:0)+(s.soir?1:0);}
    totalH+=prestaH(day.pd,day.pf);
  }
  return{totalH:totalH,repas:repas,cp:cp,am:am,ecole:ecole,recup:recup};
}
function weekStats(eid){return weekStatsW(W(),eid);}
function hSup(e,st){return st.totalH-e.h-(st.recup*8);}
function getMonthStats(yr,mo,eid,hc){
  var tot={totalH:0,repas:0,cp:0,am:0,ecole:0,recup:0,hSup:0};
  var keys=Object.keys(S.plan);
  for(var i=0;i<keys.length;i++){
    var wk=keys[i],pts=wk.split('-'),wy=parseInt(pts[0]),wm=parseInt(pts[1])-1;
    if(wy===yr&&wm===mo){
      var st=weekStatsW(wk,eid);
      tot.totalH+=st.totalH;tot.repas+=st.repas;tot.cp+=st.cp;
      tot.am+=st.am;tot.ecole+=st.ecole;tot.recup+=st.recup;
      tot.hSup+=st.totalH-hc-(st.recup*8);
    }
  }
  return tot;
}
function weekStatsReel(wk,eid){
  // Calcul depuis les données de pointage réelles
  var totalH=0,repas=0,cp=0,am=0,ecole=0,recup=0;
  for(var di=0;di<7;di++){
    var ptg=(S.ptg[wk]&&S.ptg[wk][eid]&&S.ptg[wk][eid][di])||{};
    var day=getDayW(wk,eid,di),labo=day.labo||'';
    // Absences viennent toujours du planning
    if(labo==='CP'){cp++;continue;}
    if(labo==='AM'){am++;continue;}
    if(labo==='ECOLE'){ecole++;continue;}
    if(labo==='RECUP'){recup++;continue;}
    // Heures réelles depuis pointage
    if(ptg.arrive&&ptg.depart){
      var h=(toMin(ptg.depart)-toMin(ptg.arrive))/60;
      // Déduire pause repas si créneau avec repas
      var s=slotOf(labo);
      if(s&&s.midi)h-=1;
      if(s&&s.soir)h-=1;
      // Presta
      if(day.pd&&day.pf){
        var hp=(toMin(day.pf.replace('h',':'))-toMin(day.pd.replace('h',':')))/60;
        h+=Math.max(0,hp);
      }
      if(h>0){
        totalH+=Math.max(0,h);
        if(s&&(s.midi||s.soir))repas+=(s.midi?1:0)+(s.soir?1:0);
      }
    }
  }
  return{totalH:Math.round(totalH*100)/100,repas:repas,cp:cp,am:am,ecole:ecole,recup:recup};
}
function getMonthStatsReel(yr,mo,eid,hc){
  var tot={totalH:0,repas:0,cp:0,am:0,ecole:0,recup:0,hSup:0};
  var keys=Object.keys(S.ptg);
  // Aussi prendre les semaines du planning pour les absences
  var allKeys={};
  Object.keys(S.plan).forEach(function(k){allKeys[k]=1;});
  Object.keys(S.ptg).forEach(function(k){allKeys[k]=1;});
  Object.keys(allKeys).forEach(function(wk){
    var pts=wk.split('-'),wy=parseInt(pts[0]),wm=parseInt(pts[1])-1;
    if(wy===yr&&wm===mo){
      var st=weekStatsReel(wk,eid);
      tot.totalH+=st.totalH;tot.repas+=st.repas;tot.cp+=st.cp;
      tot.am+=st.am;tot.ecole+=st.ecole;tot.recup+=st.recup;
      tot.hSup+=st.totalH-hc-(st.recup*8);
    }
  });
  tot.totalH=Math.round(tot.totalH*100)/100;
  tot.hSup=Math.round(tot.hSup*100)/100;
  return tot;
}
function getYearStatsReel(yr,eid,hc){
  var tot={totalH:0,repas:0,cp:0,am:0,ecole:0,recup:0,hSup:0};
  for(var m=0;m<12;m++){var ms=getMonthStatsReel(yr,m,eid,hc);for(var k in ms)tot[k]+=ms[k];}
  tot.totalH=Math.round(tot.totalH*100)/100;
  return tot;
}
function getMS(yr,mo,eid,hc){return(S.recapSource==='reel')?getMonthStatsReel(yr,mo,eid,hc):getMonthStats(yr,mo,eid,hc);}
function getYS(yr,eid,hc){return(S.recapSource==='reel')?getYearStatsReel(yr,eid,hc):getYearStats(yr,eid,hc);}
function getYearStats(yr,eid,hc){
  var tot={totalH:0,repas:0,cp:0,am:0,ecole:0,recup:0,hSup:0};
  for(var m=0;m<12;m++){var ms=getMonthStats(yr,m,eid,hc);for(var k in ms)tot[k]+=ms[k];}
  return tot;
}

function renderPointage(){
  var today=now0(),days=DD(),emp=actEmp();
  if(S.ptgDay===null)S.ptgDay=todayDi();
  var di=S.ptgDay,dayBtns='';
  for(var i=0;i<7;i++){
    var d=days[i],dc=new Date(d);dc.setHours(0,0,0,0);
    var isT=dc.getTime()===today.getTime();
    dayBtns+='<button class="'+(di===i?'nv':'btn')+'" style="font-size:11px;padding:4px 10px;'+(isT?'outline:2px solid var(--gold)':'')+'" onclick="setPtgDay('+i+')">'+DAYS[i]+' '+fd(d)+'</button>';
  }
  var rows='';
  for(var ei=0;ei<emp.length;ei++){
    var e=emp[ei],day=getDay(e.id,di),pg=getPtg(e.id,di),theo=plines(day).join(' &#xB7; ');
    var off=isOffId(day.labo||'')&&!day.pd;
    var pc,pt;
    if(off){pc='pof';pt=day.labo||'Repos';}
    else if(pg.arrive&&pg.depart){pc='pok';pt='Complet';}
    else if(pg.arrive){pc='pin';pt='En service';}
    else{pc='pno';pt='Non point\u00e9';}
    rows+='<tr><td style="font-weight:600">'+esc(e.p)+'</td><td style="font-size:11px;color:var(--mu)">'+theo+'</td>';
    rows+='<td>'+(off?'<span class="pill pof">&#x2014;</span>':'<input class="ti" type="time" value="'+(pg.arrive||'')+'" onchange="setPtgVal(\''+e.id+'\','+di+',\'arrive\',this.value)"/>')+'</td>';
    rows+='<td>'+(off?'<span class="pill pof">&#x2014;</span>':'<input class="ti" type="time" value="'+(pg.depart||'')+'" onchange="setPtgVal(\''+e.id+'\','+di+',\'depart\',this.value)"/>')+'</td>';
    rows+='<td><span class="pill '+pc+'">'+pt+'</span></td></tr>';
  }
  return wnav()+'<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">'+dayBtns+'</div>'
    +'<table class="pgt"><thead><tr><th>Collaborateur</th><th>Th\u00e9orique</th><th>Arriv\u00e9e</th><th>D\u00e9part</th><th>Statut</th></tr></thead><tbody>'+rows+'</tbody></table>';
}

      html+='</div></div>';
    }
  }
  html+='</div>';

  // Colonne Facturations
  html+='<div style="background:#eef1f9;border:1px solid #a0aecf;border-radius:10px;padding:1rem">';
  html+='<div style="font-weight:700;font-size:12px;color:#0D1838;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">&#x1F9FE; Facturations</div>';

      html+='<div style="background:#fff;border-radius:7px;padding:8px 10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;gap:8px">';

      html+='<div style="display:flex;gap:6px;align-items:center">';

      if(S.mode==='manager')html+='<button onclick="delArchive(\''+af.id+'\')" style="background:none;border:none;cursor:pointer;font-size:16px;color:#A32D2D;padding:0 2px;line-height:1" title="Supprimer">&#x1F5D1;</button>';
      html+='</div></div>';
    }
  }
  html+='</div>';

  html+='</div></div>'; // grid + section

  return html;
}

// ── COLLAB VIEW ──────────────────────────────────────────────
function renderCollab(){
  var me=S.emp.filter(function(e){return e.id===S.collabId;})[0];
  if(!me)return'';
  var tdi=todayDi(),days=DD(),pg=getPtg(me.id,tdi),tp=getDay(me.id,tdi);
  var off=isOffId(tp.labo||'')&&!tp.pd;
  var collabMode=S.collabViewMode||'mon';

  var hdrHtml='<div style="background:var(--navy);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;margin:-1rem -1rem 1rem">'
    +'<div style="display:flex;align-items:center;gap:10px"><div class="logo">DB</div><div style="color:#fff;font-size:14px;font-weight:700">DB&#x2013;Shift</div></div>'
    +'<div style="display:flex;gap:8px">'

    tbl+='<thead><tr>';

    for(var di2=0;di2<7;di2++)tbl+='<th style="background:#eeebe3;padding:6px 3px;text-align:center;font-size:10px;font-weight:600;color:var(--mu);border-bottom:1px solid var(--bd)">'+DAYS[di2]+'<br/><span style="font-weight:400;font-size:8px">'+fd(days2[di2])+'</span></th>';
    tbl+='</tr></thead><tbody>';
    for(var ei3=0;ei3<emp2.length;ei3++){

      tbl+='<td style="padding:6px 8px;font-weight:600;border-bottom:1px solid var(--bd)'+(isMe?';color:var(--gold)':'')+'">'+(isMe?'&#x25BA; ':'')+esc(e3.p)+'</td>';
      for(var di3=0;di3<7;di3++){
        var day3=getDay(e3.id,di3),lines3=plines(day3),off3=lines3[0]==='Repos';
        tbl+='<td style="padding:5px 3px;text-align:center;border-bottom:1px solid var(--bd);vertical-align:top">';
        if(!off3){for(var j3=0;j3<lines3.length;j3++)tbl+='<div style="font-size:'+(j3===0?'10':'8')+'px;color:'+(j3===0?'var(--tx)':'var(--mu)')+';line-height:1.3">'+lines3[j3]+'</div>';}
        else tbl+='<span style="color:#ddd">&#x2014;</span>';
        tbl+='</td>';
      }
      tbl+='</tr>';
    }
    tbl+='</tbody></table></div>';
    return hdrHtml+tabsHtml+'<div style="font-size:12px;color:var(--mu);margin-bottom:10px">'+esc(wlbl(S.wo))+'</div>'+tbl;
  }

  if(me.interim&&collabMode==='interim'){
    return hdrHtml+tabsHtml+renderInterim();

  // Mon planning

    for(var j=0;j<lines.length;j++)rows+='<div style="font-size:'+(j===0?'12':'11')+'px;color:'+(j===0?'var(--tx)':'var(--mu)')+';margin-top:2px">'+lines[j]+'</div>';
    rows+='</div>'+(isT?'<span style="font-size:10px;background:var(--gold);color:var(--navy);border-radius:20px;padding:2px 8px;flex-shrink:0;font-weight:700">Aujourd\'hui</span>':'')+'</div>';
  }
  var ptgBox='';
  if(!off){
    ptgBox='<div class="ptb"><div style="font-size:13px;font-weight:600;margin-bottom:10px">Pointage du jour</div>';
    if(pg.arrive)ptgBox+='<div style="margin-bottom:8px;font-size:12px;color:var(--mu)">Arriv\u00e9e : <strong style="color:#085041">'+pg.arrive+'</strong></div>';
    else ptgBox+='<button class="ba" onclick="ptgArrive()">Pointer mon arriv\u00e9e</button>';
    if(pg.arrive){if(pg.depart)ptgBox+='<div style="font-size:12px;color:var(--mu)">D\u00e9part : <strong style="color:#7a1818">'+pg.depart+'</strong></div>';else ptgBox+='<button class="bd" onclick="ptgDepart()">Pointer mon d\u00e9part</button>';}
    ptgBox+='</div>';
  }else{ptgBox='<div class="ptb" style="text-align:center;font-size:13px;color:var(--mu)">Vous n\'&#xEA;tes pas planifi\u00e9 aujourd\'hui.</div>';}
  return hdrHtml+'<div class="cw">'+tabsHtml
    +'<div class="cwh"><div style="font-size:11px;color:rgba(196,160,80,.7);margin-bottom:3px">'+esc(wlbl(S.wo))+'</div><div style="font-size:18px;font-weight:700;color:var(--gold)">Bonjour '+esc(me.p)+' &#x1F44B;</div></div>'
    +'<div class="cwc">'+rows+'</div>'+ptgBox+'</div>';
}

function render(){

  if(hdrExtra){
    if(S.mode==='manager'){
      hdrExtra.innerHTML='<button onclick="logout()" style="background:rgba(255,255,255,.15);border:none;border-radius:6px;color:rgba(255,255,255,.8);padding:5px 10px;font-size:11px;cursor:pointer;font-family:inherit;margin-left:8px">Déconnexion</button>';
    } else {
      hdrExtra.innerHTML='';
    }
  }
  if(S.mode==='home'){
    document.getElementById('nav').innerHTML='';
    document.getElementById('app').innerHTML=renderHome();
    return;
  }
  if(S.mode==='managerLogin'){
    document.getElementById('nav').innerHTML='';
    document.getElementById('app').innerHTML=renderManagerLogin();
    var pw=document.getElementById('pwdIn');if(pw)pw.focus();
    return;
  }

  for(var i=0;i<TABS.length;i++){var t=TABS[i];navHtml+='<button class="nt'+(S.tab===t[0]?' on':'')+'" onclick="setTab(\''+t[0]+'\')">'+t[1]+'</button>';}
  document.getElementById('nav').innerHTML=navHtml;
  var html='';
  if(S.tab==='planning')html=renderPlanning();
  else if(S.tab==='equipe')html=renderEquipe();
  else if(S.tab==='pointage')html=renderPointage();
  else if(S.tab==='recap')html=renderRecap();
  else if(S.tab==='interim')html=renderInterim();
  else if(S.tab==='collab')html=(S.collabId&&S.collabPwd)?renderCollab():renderCollabSel();

  else if(S.tab==='export')html=renderExport();
  document.getElementById('app').innerHTML=html;
  var pw=document.getElementById('pwdIn');if(pw)pw.focus();
}

function printInterim(archData){
  var wk=W();
  var lignes,semLabel,now,total_h=0,total_eur=0;
  if(archData){
    lignes=archData.lignes;semLabel=archData.semaine;now=new Date(archData.date);
    total_h=archData.total_h||0;total_eur=archData.total_eur||0;
  } else {
    if(!S.interim[wk]||!S.interim[wk].lignes||!S.interim[wk].lignes.length){alert('Aucune ligne \u00e0 exporter.');return;}
    lignes=S.interim[wk].lignes;semLabel=wlbl(S.wo);now=new Date();
    for(var j=0;j<lignes.length;j++){
      var lj=lignes[j],tAj=toMin(lj.arrive),tDj=toMin(lj.depart);
      if(tDj<=tAj)tDj+=24*60;
      var hj=Math.max(0,(tDj-tAj)/60-(parseFloat(lj.pause)||0));
      var tj=parseFloat(lj.tarif==='custom'?lj.tarif_custom:lj.tarif)||0;
      total_h+=hj;total_eur+=hj*tj;
    }
    if(!S.archives)S.archives=[];
    S.archives.push({id:String(Date.now()),type:'facturation',date:now.toISOString(),semaine:semLabel,lignes:JSON.parse(JSON.stringify(lignes)),total_h:total_h,total_eur:total_eur});
    supaSet('archives',{archives:S.archives});
    try{localStorage.setItem('dbs-ar',JSON.stringify(S.archives));}catch(e){}
    render();
  }
  var win=window.open('','_blank','width=1000,height=700');
  win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Int\u00e9rim</title><style>');
  win.document.write('@page{size:A4 landscape;margin:1cm}body{font-family:Helvetica,Arial,sans-serif;color:#1a1a18;font-size:12px}');

  win.document.write('<div class="hdr"><div><div style="font-size:18px;font-weight:700;color:#C4A050">R\u00e9capitulatif Int\u00e9rim</div><div style="font-size:11px;color:rgba(255,255,255,.6);margin-top:3px">'+semLabel+'</div></div><div style="text-align:right;color:rgba(255,255,255,.8)"><div>David Boyer Traiteur</div><div style="font-size:10px;opacity:.6">'+now.toLocaleDateString('fr-FR')+'</div></div></div>');
  win.document.write('<table><thead><tr><th>Nom</th><th>Prestation</th><th>Poste</th><th>Date</th><th>Arriv\u00e9e</th><th>D\u00e9part</th><th>Pause</th><th>H. nettes</th><th>Tarif HT/h</th><th>Total HT</th></tr></thead><tbody>');
  for(var i=0;i<lignes.length;i++){
    var l=lignes[i];
    var tA=toMin(l.arrive),tD=toMin(l.depart);if(tD<=tA)tD+=24*60;var h=Math.max(0,(tD-tA)/60-(parseFloat(l.pause)||0));
    var tarif=parseFloat(l.tarif==='custom'?l.tarif_custom:l.tarif)||0;
    var eur=h*tarif;

    var pauseStr=l.pause==='0.5'?'30 min':l.pause==='1'?'1h':l.pause==='1.5'?'1h30':'&#x2014;';

  }
  var tva=total_eur*0.20,ttc=total_eur+tva;

  win.document.write('</tbody></table>');
  win.document.write('<div class="footer"><span>Signature employeur : _______________</span><span>Signature agence : _______________</span></div>');

async function publier(){
  var emp=actEmp().filter(function(e){return e.email&&e.email.indexOf('@')>=0;});
  if(!emp.length||S.sending)return;
  S.sending=true;S.sendRes=null;render();
  var days=DD(),res=[];
  for(var i=0;i<emp.length;i++){
    var e=emp[i];
    var lines=['Planning de '+e.p+' \u2014 '+wlbl(S.wo),''];
    for(var di=0;di<7;di++)lines.push(DAYSFULL[di]+' '+fd(days[di])+' : '+plines(getDay(e.id,di)).join(' / '));
    try{
      var r=await fetch('https://api.emailjs.com/api/v1.0/email/send',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({service_id:S.cfg.sid,template_id:S.cfg.tid,user_id:S.cfg.key,
          template_params:{to_email:e.email,to_name:e.p,message:lines.join('\n')}})
      });
      res.push({n:e.p,ok:r.ok});
    }catch(err){res.push({n:e.p,ok:false});}
  }
  S.sending=false;S.sendRes=res;render();
}
